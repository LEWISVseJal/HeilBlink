<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HeilBlick is a smart disease predictor for diabetes, breast cancer, liver disease, and pneumonia screening.">
  <meta name="author" content="Sejal Lewis">
  <title>{% block title %}HeilBlick | Smart Disease Predictor{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script>document.documentElement.classList.add("js-ready");</script>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <div class="site-bg" aria-hidden="true">
    <div class="site-bg__orb site-bg__orb--one"></div>
    <div class="site-bg__orb site-bg__orb--two"></div>
    <div class="site-bg__orb site-bg__orb--three"></div>
  </div>

  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="{{ url_for('home') }}">
        <img class="brand__logo" src="{{ url_for('static', filename='logo.png') }}" alt="HeilBlick logo">
      </a>

      <nav class="site-nav" aria-label="Primary navigation">
        <a class="site-nav__link {% if request.endpoint == 'home' %}is-active{% endif %}" href="{{ url_for('home') }}">Home</a>
        <a class="site-nav__link {% if request.endpoint == 'dashboardPage' %}is-active{% endif %}" href="{{ url_for('dashboardPage') }}">Dashboard</a>
        <a class="site-nav__link {% if request.endpoint == 'diabetesPage' %}is-active{% endif %}" href="{{ url_for('diabetesPage') }}">Diabetes</a>
        <a class="site-nav__link {% if request.endpoint == 'cancerPage' %}is-active{% endif %}" href="{{ url_for('cancerPage') }}">Breast Cancer</a>
        <a class="site-nav__link {% if request.endpoint == 'liverPage' %}is-active{% endif %}" href="{{ url_for('liverPage') }}">Liver</a>
        <a class="site-nav__link {% if request.endpoint == 'pneumoniaPage' %}is-active{% endif %}" href="{{ url_for('pneumoniaPage') }}">Pneumonia</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="page-shell">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p>Built by Sejal Lewis.</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
